<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ninja — Agent Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0b0b12;
            --bg2: #111119;
            --card: #16161f;
            --card-hover: #1c1c28;
            --terminal: #0d0d14;
            --text: #eaeaf0;
            --text2: #9494ad;
            --text3: #555570;
            --border: #252535;
            --blue: #3b82f6;
            --purple: #8b5cf6;
            --green: #10b981;
            --orange: #f59e0b;
            --red: #ef4444;
            --cyan: #06b6d4;
            --pink: #ec4899;
            --r: 12px;
            --shadow: 0 2px 16px rgba(0,0,0,0.35);
        }
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }
        body::before {
            content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
            background:
                radial-gradient(ellipse at 15% 10%, rgba(59,130,246,0.05) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 85%, rgba(139,92,246,0.05) 0%, transparent 55%);
        }

        /* ── Container ── */
        .container { max-width: 1340px; margin: 0 auto; padding: 28px 24px; position: relative; z-index:1; }

        /* ── Header ── */
        .hdr {
            display: flex; align-items: center; gap: 20px;
            padding: 20px 24px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            margin-bottom: 20px;
            position: relative;
        }
        .hdr::before {
            content:''; position:absolute; top:0; left:0; right:0; height:2px;
            background: linear-gradient(90deg, var(--blue), var(--purple), var(--pink));
            border-radius: 14px 14px 0 0;
        }
        .avatar {
            width: 56px; height: 56px; border-radius: 50%;
            border: 2px solid var(--purple);
            box-shadow: 0 0 16px rgba(139,92,246,0.2);
            object-fit: cover; flex-shrink:0;
        }
        .hdr-info { flex:1; min-width:0; }
        .hdr-name { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
        .hdr-role { font-size: 12px; color: var(--text2); margin-top: 2px; }
        .hdr-badges { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
        .badge {
            font-size: 11px; padding: 3px 10px; border-radius: 20px;
            border: 1px solid var(--border); color: var(--text2);
            background: rgba(255,255,255,0.02); white-space: nowrap;
        }
        .badge .dot { display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--green); margin-right:4px; vertical-align:middle; }
        .badge-model { border-color: var(--purple); color: var(--purple); }

        /* Header KPIs */
        .hdr-kpis { display: flex; gap: 12px; flex-shrink:0; }
        .kpi {
            text-align: center; padding: 10px 18px;
            background: rgba(255,255,255,0.02);
            border-radius: 10px; border: 1px solid var(--border);
            min-width: 90px; position: relative;
        }
        .kpi-val { font-size: 20px; font-weight: 700; color: var(--cyan); }
        .kpi-val.green { color: var(--green); }
        .kpi-lbl { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }


        /* ── Stat Cards Row ── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .sc {
            background: var(--card); border:1px solid var(--border); border-radius: var(--r);
            padding: 16px 18px; text-align:center;
            transition: border-color 0.2s, transform 0.15s;
        }
        .sc:hover { border-color: rgba(255,255,255,0.1); transform: translateY(-1px); }
        .sc-val { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
        .sc-lbl { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.6px; margin-top: 4px; }
        .sc-bar { height:3px; border-radius:2px; margin-top:10px; opacity:0.5; }

        /* ── Grid Sections ── */
        .grid2 { display:grid; grid-template-columns: 1fr 1fr; gap:16px; margin-bottom:20px; }
        .panel {
            background: var(--card); border:1px solid var(--border); border-radius: var(--r);
            display:flex; flex-direction:column;
        }
        .panel-hdr {
            display:flex; align-items:center; justify-content:space-between;
            padding: 14px 18px; border-bottom: 1px solid var(--border);
            font-size: 13px; font-weight: 600;
        }
        .panel-hdr-icon { margin-right: 8px; }
        .panel-body { padding: 14px 18px; flex:1; overflow:hidden; }

        /* ── Full Width Panel ── */
        .full-panel { margin-bottom: 20px; }

        /* ── Live Logs ── */
        .log-tabs { display:flex; gap:6px; flex-wrap:wrap; }
        .log-tab {
            font-size:11px; padding:4px 12px; border-radius:6px; cursor:pointer;
            background:rgba(255,255,255,0.04); border:1px solid transparent;
            color:var(--text2); transition: all 0.2s; white-space:nowrap;
        }
        .log-tab:hover { background:rgba(255,255,255,0.07); }
        .log-tab.active { background:var(--blue); color:#fff; border-color:var(--blue); }
        .log-controls { display:flex; align-items:center; gap:8px; }
        .log-check { display:flex; align-items:center; gap:4px; font-size:11px; color:var(--text2); cursor:pointer; }
        .log-check input { accent-color: var(--blue); }
        .log-btn {
            font-size:11px; padding:4px 12px; border-radius:6px; cursor:pointer;
            border:1px solid var(--border); background:transparent; color:var(--text2);
            transition: all 0.2s;
        }
        .log-btn:hover { border-color:var(--text2); color:var(--text); }
        .log-btn.active { background:var(--blue); color:#fff; border-color:var(--blue); }
        .log-output {
            background: var(--terminal);
            border-radius: 8px;
            padding: 12px 14px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11.5px;
            line-height: 1.65;
            max-height: 380px;
            overflow-y: auto;
            color: var(--text2);
            white-space: pre-wrap;
            word-break: break-all;
            margin-top: 10px;
        }
        .log-output::-webkit-scrollbar { width:6px; }
        .log-output::-webkit-scrollbar-track { background:transparent; }
        .log-output::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

        /* ── Tool Usage ── */
        .tool-list { max-height: 340px; overflow-y: auto; }
        .tool-row {
            display:flex; justify-content:space-between; align-items:center;
            padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.03);
            font-size: 13px;
        }
        .tool-row:last-child { border-bottom:none; }
        .tool-name { font-family:'JetBrains Mono',monospace; color:var(--text); font-size:12px; }
        .tool-count {
            font-weight:600; color:var(--cyan);
            background: rgba(6,182,212,0.1); padding:3px 10px; border-radius:20px;
            font-size:12px; font-family:'JetBrains Mono',monospace;
        }

        /* ── Prompts ── */
        .prompt-list { max-height: 340px; overflow-y: auto; }
        .prompt-item {
            padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.03);
            cursor: pointer; transition: background 0.2s;
        }
        .prompt-item:hover { background: rgba(255,255,255,0.02); margin:0 -18px; padding:12px 18px; border-radius:8px; }
        .prompt-item:last-child { border-bottom:none; }
        .prompt-time { font-size:11px; color:var(--text3); margin-bottom:4px; }
        .prompt-text {
            font-size:12.5px; color:var(--text2); line-height:1.55;
            overflow:hidden; text-overflow:ellipsis;
            display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
        }
        .prompt-badges { display:flex; gap:6px; margin-top:6px; }
        .prompt-badge {
            font-size:10px; padding:2px 8px; border-radius:4px;
            font-family:'JetBrains Mono',monospace;
        }
        .prompt-badge.tools { background:rgba(6,182,212,0.12); color:var(--cyan); }
        .prompt-badge.steps { background:rgba(139,92,246,0.12); color:var(--purple); }

        /* ── Modal ── */
        .modal-overlay {
            display:none; position:fixed; inset:0; z-index:500;
            background:rgba(0,0,0,0.7); backdrop-filter:blur(4px);
            align-items:center; justify-content:center;
        }
        .modal-overlay.show { display:flex; }
        .modal {
            background:var(--card); border:1px solid var(--border); border-radius:14px;
            width:92%; max-width:900px; max-height:90vh;
            display:flex; flex-direction:column;
            box-shadow: 0 24px 60px rgba(0,0,0,0.5);
        }
        .modal-hdr {
            display:flex; justify-content:space-between; align-items:center;
            padding:16px 20px; border-bottom:1px solid var(--border);
        }
        .modal-hdr h3 { font-size:15px; font-weight:600; }
        .modal-close {
            width:30px; height:30px; border-radius:8px; border:1px solid var(--border);
            background:transparent; color:var(--text2); cursor:pointer;
            display:flex; align-items:center; justify-content:center; font-size:16px;
            transition: all 0.2s;
        }
        .modal-close:hover { background:var(--red); color:#fff; border-color:var(--red); }
        .modal-body {
            padding:20px; overflow-y:auto; flex:1;
        }
        .modal-prompt {
            background: var(--terminal); border-radius:8px; padding:14px;
            font-size:12.5px; line-height:1.6; color:var(--text2);
            margin-bottom:16px; white-space:pre-wrap; word-break:break-word;
            max-height:120px; overflow-y:auto;
        }
        .modal-section-title {
            font-size:12px; font-weight:600; text-transform:uppercase;
            letter-spacing:0.5px; color:var(--text3); margin-bottom:10px;
        }

        /* Trajectory steps */
        .traj-steps { max-height:60vh; overflow-y:auto; }
        .ts {
            display:flex; gap:10px; padding:8px 12px;
            border-left:2px solid var(--border); margin-left:8px;
            position:relative; transition: background 0.2s;
        }
        .ts:hover { background:rgba(255,255,255,0.02); }
        .ts::before {
            content:''; position:absolute; left:-6px; top:14px;
            width:10px; height:10px; border-radius:50%;
            border:2px solid var(--border); background:var(--card);
        }
        .ts.tu { border-left-color:var(--cyan); }
        .ts.tu::before { border-color:var(--cyan); background:rgba(6,182,212,0.3); }
        .ts.tr { border-left-color:var(--orange); }
        .ts.tr::before { border-color:var(--orange); background:rgba(245,158,11,0.3); }
        .ts.at { border-left-color:var(--green); }
        .ts.at::before { border-color:var(--green); background:rgba(16,185,129,0.3); }
        .ts-icon { font-size:14px; min-width:22px; text-align:center; padding-top:1px; }
        .ts-body { flex:1; min-width:0; }
        .ts-lbl {
            font-size:10px; font-weight:600; text-transform:uppercase;
            letter-spacing:0.5px; margin-bottom:2px;
        }
        .ts-lbl.lbl-tu { color:var(--cyan); }
        .ts-lbl.lbl-tr { color:var(--orange); }
        .ts-lbl.lbl-at { color:var(--green); }
        .ts-detail {
            font-family:'JetBrains Mono',monospace; font-size:11px;
            color:var(--text2); white-space:pre-wrap; word-break:break-word;
            max-height:300px; overflow-y:auto; line-height:1.5;
            background: rgba(0,0,0,0.15); border-radius:6px; padding:6px 8px;
            margin-top:4px;
        }

        /* ── Chart Section ── */
        .chart-wrap { padding: 14px 18px; }
        .chart-canvas { max-height: 260px; }

        /* ── Responsive ── */
        @media (max-width: 900px) {
            .hdr { flex-direction:column; text-align:center; }
            .hdr-kpis { justify-content:center; }
            .hdr-badges { justify-content:center; }
            .stats-grid { grid-template-columns: repeat(3, 1fr); }
            .grid2 { grid-template-columns: 1fr; }
        }
        @media (max-width: 600px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .hdr-kpis { flex-wrap:wrap; }
        }

        /* ── Scrollbars ── */
        ::-webkit-scrollbar { width:5px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
    </style>
    <script src="https://sites.super.betamyninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>
    <div class="container">

        <!-- ═══ HEADER ═══ -->
        <div class="hdr" id="header">
            <img class="avatar" id="agentAvatar" src="" alt="">
            <div class="hdr-info">
                <div class="hdr-name" id="agentName">Loading…</div>
                <div class="hdr-role" id="agentRole"></div>
                <div class="hdr-badges">
                    <span class="badge"><span class="dot"></span><span id="agentStatus">Online</span></span>
                    <span class="badge" id="agentChannel"></span>
                    <span class="badge" id="agentWorkspace"></span>
                    <span class="badge badge-model" id="agentModel">🧠 …</span>
                </div>
            </div>
            <div class="hdr-kpis">
                <a href="/cost" class="kpi" style="text-decoration:none; cursor:pointer; transition: border-color 0.2s;" onmouseover="this.style.borderColor='var(--green)'" onmouseout="this.style.borderColor=''">
                    <div class="kpi-val green" id="totalCost" style="font-size:18px;">—</div>
                    <div class="kpi-lbl">Total Cost</div>
                </a>

                <div class="kpi">
                    <div class="kpi-val" id="totalMessages">0</div>
                    <div class="kpi-lbl">Messages</div>
                </div>
                <div class="kpi">
                    <div class="kpi-val" id="totalTools">0</div>
                    <div class="kpi-lbl">Tool Uses</div>
                </div>
            </div>
        </div>

        <!-- ═══ STAT CARDS ═══ -->
        <div class="stats-grid" id="statsRow">
            <div class="sc">
                <div class="sc-val" id="inputTokens" style="color:var(--blue)">0</div>
                <div class="sc-lbl">Base Input (uncached)</div>
                <div class="sc-bar" style="background:var(--blue)"></div>
            </div>
            <div class="sc">
                <div class="sc-val" id="outputTokens" style="color:var(--purple)">0</div>
                <div class="sc-lbl">Output Tokens</div>
                <div class="sc-bar" style="background:var(--purple)"></div>
            </div>
            <div class="sc">
                <div class="sc-val" id="cacheWrite5mTokens" style="color:var(--orange)">0</div>
                <div class="sc-lbl">Cache Write (5m)</div>
                <div class="sc-bar" style="background:var(--orange)"></div>
            </div>
            <div class="sc">
                <div class="sc-val" id="cacheWrite1hTokens" style="color:var(--red)">0</div>
                <div class="sc-lbl">Cache Write (1h)</div>
                <div class="sc-bar" style="background:var(--red)"></div>
            </div>
            <div class="sc">
                <div class="sc-val" id="cacheReadTokens" style="color:var(--green)">0</div>
                <div class="sc-lbl">Cache Read</div>
                <div class="sc-bar" style="background:var(--green)"></div>
            </div>
        </div>

        <!-- ═══ LIVE LOGS (full width) ═══ -->
        <div class="panel full-panel">
            <div class="panel-hdr">
                <div style="display:flex;align-items:center;gap:12px;">
                    <span>📋 Live Logs</span>
                    <div class="log-tabs" id="logTabs"></div>
                </div>
                <div class="log-controls">
                    <label class="log-check"><input type="checkbox" id="hideHeartbeats" checked onchange="reloadCurrentLog()"> Hide heartbeats</label>
                    <button class="log-btn" id="autoScrollBtn" onclick="toggleAutoScroll()">⬇ Auto-scroll</button>
                    <button class="log-btn" onclick="clearLogs()">✕ Clear</button>
                </div>
            </div>
            <div class="panel-body" style="padding:10px 14px;">
                <div class="log-output" id="logOutput">Waiting for logs…</div>
            </div>
        </div>

        <!-- ═══ TOOL USAGE + RECENT PROMPTS ═══ -->
        <div class="grid2">
            <div class="panel">
                <div class="panel-hdr">
                    <span>🔧 Tool Usage</span>
                    <span style="font-size:12px;color:var(--text3);" id="toolTotal">0 total</span>
                </div>
                <div class="panel-body">
                    <div class="tool-list" id="toolList"></div>
                </div>
            </div>
            <div class="panel">
                <div class="panel-hdr">
                    <span>💬 Recent Prompts</span>
                </div>
                <div class="panel-body">
                    <div class="prompt-list" id="promptList"></div>
                </div>
            </div>
        </div>

        <!-- ═══ TOKEN TIMELINE ═══ -->
        <div class="panel full-panel">
            <div class="panel-hdr"><span>📊 Token Usage Timeline</span></div>
            <div class="chart-wrap">
                <canvas id="tokenChart" class="chart-canvas"></canvas>
            </div>
        </div>
    </div>

    <!-- ═══ PROMPT MODAL ═══ -->
    <div class="modal-overlay" id="promptModal" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-hdr">
                <h3>🔍 Agentic Trajectory</h3>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script>
        /* ═══════════ STATE ═══════════ */
        let currentLogFile = '';
        let logPollingInterval = null;
        let autoScroll = true;
        let promptsData = [];
        let tokenChart = null;

        /* ═══════════ INIT ═══════════ */
        async function init() {
            await loadAgent();
            await Promise.all([loadStats(), loadLogFiles(), loadTools(), loadPrompts(), loadChart(), loadTotalCost()]);
            setInterval(loadStats, 30000);
            setInterval(loadPrompts, 60000);
            setInterval(loadTools, 60000);
            setInterval(loadChart, 60000);
            setInterval(loadTotalCost, 30000);
        }

        async function loadTotalCost() {
            try {
                const res = await fetch('/api/cost/prompts');
                const { prompts } = await res.json();
                const total = prompts.filter(p => p.cost != null).reduce((s, p) => s + p.cost, 0);
                document.getElementById('totalCost').textContent = total > 0 ? `$${total.toFixed(4)}` : '—';
            } catch(e) { console.error('loadTotalCost:', e); }
        }
        init();

        /* ═══════════ AGENT INFO ═══════════ */
        async function loadAgent() {
            try {
                const r = await fetch('/api/agent');
                const d = await r.json();
                document.getElementById('agentName').textContent = d.name || 'Ninja';
                document.getElementById('agentRole').textContent = d.role || '';
                const avatarUrl = d.avatar || d.icon_url || '';
                if (avatarUrl) document.getElementById('agentAvatar').src = avatarUrl;
                if (d.channel) document.getElementById('agentChannel').textContent = '# ' + d.channel;
                if (d.workspace) document.getElementById('agentWorkspace').textContent = d.workspace;
                if (d.color) {
                    document.querySelector('.avatar').style.borderColor = d.color;
                    document.querySelector('.avatar').style.boxShadow = `0 0 16px ${d.color}33`;
                }
            } catch(e) { console.error('loadAgent:', e); }
        }

        /* ═══════════ STATS ═══════════ */
        async function loadStats() {
            try {
                const res = await fetch('/api/claude-monitor/stats');
                const data = await res.json();
                const s = data.stats || {};

                document.getElementById('totalMessages').textContent = formatNumber(s.total_messages || 0);
                document.getElementById('totalTools').textContent = formatNumber(s.total_tool_uses || 0);
                document.getElementById('inputTokens').textContent = formatTokens(s.total_input_tokens || 0);
                document.getElementById('outputTokens').textContent = formatTokens(s.total_output_tokens || 0);
                document.getElementById('cacheWrite5mTokens').textContent = formatTokens(s.total_cache_write_5m_tokens || 0);
                document.getElementById('cacheWrite1hTokens').textContent = formatTokens(s.total_cache_write_1h_tokens || 0);
                document.getElementById('cacheReadTokens').textContent = formatTokens(s.total_cache_read_tokens || 0);

                // Model badge
                if (s.model) {
                    document.getElementById('agentModel').textContent = `🧠 ${s.model}`;
                } else {
                    document.getElementById('agentModel').textContent = '🧠 No model data';
                }

            } catch(e) { console.error('loadStats:', e); }
        }

        /* ═══════════ LOG FILES ═══════════ */
        async function loadLogFiles() {
            try {
                const r = await fetch('/api/logs');
                const data = await r.json();
                const files = (data.files || []).map(f => f.name || f);
                const tabs = document.getElementById('logTabs');
                tabs.innerHTML = '';
                files.forEach((f, i) => {
                    const t = document.createElement('span');
                    t.className = 'log-tab' + (i === 0 ? ' active' : '');
                    t.textContent = f;
                    t.onclick = () => selectLog(f, t);
                    tabs.appendChild(t);
                });
                if (files.length > 0) selectLog(files[0], tabs.children[0]);
            } catch(e) { console.error('loadLogFiles:', e); }
        }

        async function selectLog(filename, tabEl) {
            document.querySelectorAll('.log-tab').forEach(t => t.classList.remove('active'));
            if (tabEl) tabEl.classList.add('active');
            currentLogFile = filename;
            await fetchLogContent(filename);
            startLogPolling(filename);
        }

        function logApiPath(filename) {
            // Strip .log extension to avoid proxy 403 blocking
            const clean = filename.replace(/\.log$/, '');
            return `/api/logs/${encodeURIComponent(clean)}?lines=500`;
        }

        async function fetchLogContent(filename) {
            try {
                const r = await fetch(logApiPath(filename));
                const data = await r.json();
                const text = data.content || '';
                const el = document.getElementById('logOutput');
                el.innerHTML = '';
                text.split('\n').forEach(line => { if (shouldShowLine(line)) appendLogLine(line); });
                if (autoScroll) el.scrollTop = 0;
            } catch(e) { console.error('fetchLog:', e); }
        }

        function startLogPolling(filename) {
            if (logPollingInterval) clearInterval(logPollingInterval);
            logPollingInterval = setInterval(() => {
                if (currentLogFile === filename) fetchLogContent(filename);
            }, 5000);
        }

        function shouldShowLine(text) {
            if (!text.trim()) return false;
            if (document.getElementById('hideHeartbeats').checked) {
                const lower = text.toLowerCase();
                if (lower.includes('heartbeat') || lower.includes('♥') || lower.includes('ping')) return false;
            }
            return true;
        }

        function appendLogLine(text) {
            const el = document.getElementById('logOutput');
            const div = document.createElement('div');
            div.innerHTML = colorizeLog(text);
            el.appendChild(div);
        }

        function reloadCurrentLog() {
            if (currentLogFile) fetchLogContent(currentLogFile);
        }

        function colorizeLog(text) {
            let s = escapeHtml(text);
            s = s.replace(/\b(ERROR|CRITICAL|FATAL)\b/gi, '<span style="color:var(--red);font-weight:600">$1</span>');
            s = s.replace(/\b(WARNING|WARN)\b/gi, '<span style="color:var(--orange);font-weight:600">$1</span>');
            s = s.replace(/\b(INFO)\b/gi, '<span style="color:var(--blue);font-weight:500">$1</span>');
            s = s.replace(/\b(DEBUG)\b/gi, '<span style="color:var(--text3)">$1</span>');
            s = s.replace(/\b(SUCCESS|COMPLETED|DONE|✅)\b/gi, '<span style="color:var(--green);font-weight:600">$1</span>');
            s = s.replace(/((?:\d{4}-\d{2}-\d{2}[\sT]\d{2}:\d{2}:\d{2}))/g, '<span style="color:var(--text3)">$1</span>');
            return s;
        }

        function toggleAutoScroll() {
            autoScroll = !autoScroll;
            const btn = document.getElementById('autoScrollBtn');
            btn.classList.toggle('active', autoScroll);
        }

        function clearLogs() {
            document.getElementById('logOutput').innerHTML = '';
        }

        /* ═══════════ TOOLS ═══════════ */
        async function loadTools() {
            try {
                const r = await fetch('/api/claude-monitor/tools/summary');
                const d = await r.json();
                const el = document.getElementById('toolList');
                document.getElementById('toolTotal').textContent = `${d.total || 0} total`;
                el.innerHTML = '';
                (d.summary || []).forEach(t => {
                    el.innerHTML += `<div class="tool-row"><span class="tool-name">${escapeHtml(t.name)}</span><span class="tool-count">${t.count}</span></div>`;
                });
            } catch(e) { console.error('loadTools:', e); }
        }

        /* ═══════════ PROMPTS ═══════════ */
        async function loadPrompts() {
            try {
                const r = await fetch('/api/claude-monitor/prompts');
                const data = await r.json();
                promptsData = data.prompts || data || [];
                const el = document.getElementById('promptList');
                el.innerHTML = '';
                (promptsData || []).forEach((p, i) => {
                    const toolBadge = p.tool_count ? `<span class="prompt-badge tools">🔧 ${p.tool_count} tools</span>` : '';
                    const stepBadge = p.step_count ? `<span class="prompt-badge steps">📍 ${p.step_count} steps</span>` : '';
                    el.innerHTML += `
                        <div class="prompt-item" onclick="openPromptModal(${i})">
                            <div class="prompt-time">${formatTime(p.timestamp)}</div>
                            <div class="prompt-text">${escapeHtml(p.content || '')}</div>
                            <div class="prompt-badges">${toolBadge}${stepBadge}</div>
                        </div>`;
                });
            } catch(e) { console.error('loadPrompts:', e); }
        }

        function openPromptModal(index) {
            const p = promptsData[index];
            if (!p) return;
            const modal = document.getElementById('promptModal');
            const body = document.getElementById('modalBody');

            let html = `<div class="modal-prompt">${escapeHtml(p.content || '')}</div>`;

            if (p.steps && p.steps.length > 0) {
                html += `<div class="modal-section-title">Trajectory (${p.steps.length} steps)</div>`;
                html += `<div class="traj-steps">`;
                p.steps.forEach(step => {
                    if (step.type === 'tool_use') {
                        const inputText = step.input || step.detail || '';
                        html += `
                            <div class="ts tu">
                                <div class="ts-icon">🔧</div>
                                <div class="ts-body">
                                    <div class="ts-lbl lbl-tu">Tool Use → ${escapeHtml(step.name || '')}</div>
                                    ${inputText ? `<div class="ts-detail">${escapeHtml(inputText)}</div>` : ''}
                                </div>
                            </div>`;
                    } else if (step.type === 'tool_result') {
                        const outputText = step.output || step.detail || '';
                        html += `
                            <div class="ts tr">
                                <div class="ts-icon">📋</div>
                                <div class="ts-body">
                                    <div class="ts-lbl lbl-tr">Tool Result</div>
                                    ${outputText ? `<div class="ts-detail">${escapeHtml(outputText)}</div>` : '<div class="ts-detail" style="color:var(--text3);font-style:italic;">(empty result)</div>'}
                                </div>
                            </div>`;
                    } else if (step.type === 'assistant_text' || step.type === 'text') {
                        const textContent = step.text || step.detail || '';
                        html += `
                            <div class="ts at">
                                <div class="ts-icon">💭</div>
                                <div class="ts-body">
                                    <div class="ts-lbl lbl-at">Assistant</div>
                                    ${textContent ? `<div class="ts-detail">${escapeHtml(textContent)}</div>` : ''}
                                </div>
                            </div>`;
                    }
                });
                html += `</div>`;
            }

            if (p.response) {
                html += `<div class="modal-section-title" style="margin-top:16px;">Final Response</div>`;
                html += `<div class="modal-prompt">${escapeHtml(p.response)}</div>`;
            }

            body.innerHTML = html;
            modal.classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        function closeModal(event) {
            if (event && event.target !== event.currentTarget && !event.target.classList.contains('modal-close')) return;
            document.getElementById('promptModal').classList.remove('show');
            document.body.style.overflow = '';
        }

        /* ═══════════ CHART ═══════════ */
        async function loadChart() {
            try {
                const r = await fetch('/api/claude-monitor/timeline');
                const d = await r.json();
                const timeline = d.timeline || d || [];
                if (!timeline.length) return;

                const ctx = document.getElementById('tokenChart').getContext('2d');
                if (tokenChart) tokenChart.destroy();

                tokenChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: timeline.map(t => formatTime(t.timestamp)),
                        datasets: [
                            { label:'Input', data:timeline.map(t=>t.input_tokens), backgroundColor:'rgba(59,130,246,0.6)', borderRadius:3 },
                            { label:'Output', data:timeline.map(t=>t.output_tokens), backgroundColor:'rgba(139,92,246,0.6)', borderRadius:3 },
                            { label:'Cache Read', data:timeline.map(t=>t.cache_read_tokens), backgroundColor:'rgba(16,185,129,0.6)', borderRadius:3 },
                            { label:'Cache Write (5m)', data:timeline.map(t=>t.cache_write_5m_tokens||0), backgroundColor:'rgba(245,158,11,0.6)', borderRadius:3 },
                            { label:'Cache Write (1h)', data:timeline.map(t=>t.cache_write_1h_tokens||0), backgroundColor:'rgba(239,68,68,0.6)', borderRadius:3 },
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: { mode:'index', intersect:false },
                        plugins: {
                            legend: { labels:{ color:'#9494ad', boxWidth:10, font:{size:11} } },
                            tooltip: { backgroundColor:'#1c1c28', borderColor:'#252535', borderWidth:1, titleColor:'#eaeaf0', bodyColor:'#9494ad' }
                        },
                        scales: {
                            x: { stacked:true, ticks:{color:'#555570',font:{size:10},maxRotation:45}, grid:{display:false} },
                            y: { stacked:true, ticks:{color:'#555570',font:{size:10},callback:v=>formatTokens(v)}, grid:{color:'rgba(255,255,255,0.03)'} }
                        }
                    }
                });
            } catch(e) { console.error('loadChart:', e); }
        }

/* ═══════════ UTILITIES ═══════════ */
        function formatNumber(n) {
            if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
            if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
            return n.toString();
        }
        function formatTokens(n) {
            if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
            if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
            return n.toString();
        }
        function formatTime(ts) {
            if (!ts) return '';
            try {
                const d = new Date(ts);
                return d.toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
            } catch(e) { return ts; }
        }
        function escapeHtml(text) {
            if (!text) return '';
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }
    </script>
</body>
</html>
